<section>
  <div class="mb-6">
    <h1 class="text-xl font-bold mb-1">Account Settings</h1>
    <p class="text-sm font-medium text-[#6A7282]">
      Update your profile information and change your password
    </p>
  </div>
  <div class="bg-white rounded-3xl border border-[#F3F4F6] shadow-sm overflow-hidden mb-6">
    <div class="p-8 border-b border-[#F3F4F6]">
      <div class="flex items-center gap-4 mb-6">
        <div class="w-14 h-14 rounded-2xl bg-[#DCFCE7] flex items-center justify-center">
          <i class="fa-solid fa-user text-2xl text-[#16A34A]"></i>
        </div>
        <div class="">
          <p class="font-bold">Profile Information</p>
          <p class="font-medium text-sm text-[#6A7282]">Update your personal details</p>
        </div>
      </div>
      <form [formGroup]="userDataForm" (ngSubmit)="updateUserData()" class="space-y-5">
        <div>
          @if (userAlertmsg() != null) {
            <app-d-alert [alertType]="userAlertType()" [alertmsg]="userAlertmsg()!"></app-d-alert>
          }
        </div>
        <div>
          <app-input-field
            inputId="fullname"
            inputLabel="Full Name"
            inputPlaceHolder="Enter your name"
            inputType="text"
            [control]="userDataForm.get('name')!"
          ></app-input-field>
        </div>
        <div>
          <app-input-field
            inputId="email"
            inputLabel="Email Address"
            inputPlaceHolder="Enter your email"
            inputType="email"
            [control]="userDataForm.get('email')!"
          ></app-input-field>
        </div>
        <div>
          <app-input-field
            inputId="phonef"
            inputLabel="Phone Number"
            inputPlaceHolder="01xxxxxxxxx"
            inputType="tel"
            [control]="userDataForm.get('phone')!"
          ></app-input-field>
        </div>
        <div class="pt-4">
          <button
            [disabled]="userDataForm.invalid || isLoading()"
            class="py-3 px-6 rounded-xl bg-[#16A34A] text-white cursor-pointer font-semibold disabled:cursor-no-drop disabled:opacity-40"
          >
            @if (!isLoading()) {
              <i class="fa-solid fa-floppy-disk me-2"></i>
              Save Changes
            }
            @if (isLoading()) {
              <i class="fa-solid fa-spinner animate-spin"></i>
              Saving...
            }
          </button>
        </div>
      </form>
    </div>
    <div class="p-8 bg-[#F9FAFB]">
      <h3 class="font-bold mb-4">Account Information</h3>
      <div class="space-y-3">
        <div class="flex justify-between items-center">
          <p class="text-[#6A7282] text-sm font-medium">User ID</p>
          <p class="text-[#364153] text-[8px]">—</p>
        </div>
        <div class="flex justify-between items-center">
          <p class="text-[#6A7282] text-sm font-medium">Role</p>
          <p class="text-[#15803D] bg-[#DCFCE7] text-sm font-medium py-1 px-3 rounded-[8px]">
            User
          </p>
        </div>
      </div>
    </div>
  </div>
  <div class="bg-white rounded-3xl border border-[#F3F4F6] shadow-sm overflow-hidden">
    <div class="p-8">
      <div class="flex items-center gap-4 mb-6">
        <div class="w-14 h-14 rounded-2xl bg-[#FEF3C6] flex items-center justify-center">
          <i class="fa-solid fa-lock text-2xl text-[#E17100]"></i>
        </div>
        <div class="">
          <p class="font-bold">Change Password</p>
          <p class="font-medium text-sm text-[#6A7282]">Update your account password</p>
        </div>
      </div>
      <form [formGroup]="changePasswordForm" (ngSubmit)="changePassword()" class="space-y-5">
        <div>
          @if (passwordAlertmsg() != null) {
            <app-d-alert [alertType]="passwordAlertType()" [alertmsg]="passwordAlertmsg()!"></app-d-alert>
          }
        </div>
        <div>
          <app-input-field
            inputId="currentPassword"
            inputLabel="Current Password"
            inputPlaceHolder="Enter your Current Password"
            inputType="password"
            [control]="changePasswordForm.get('currentPassword')!"
          ></app-input-field>
        </div>
        <div>
          <app-input-field
            inputId="newPassword"
            inputLabel="New Password"
            inputPlaceHolder="Enter your new password"
            inputType="password"
            [control]="changePasswordForm.get('password')!"
          ></app-input-field>
        </div>
        <div>
          <app-input-field
            inputId="rePassword"
            inputLabel="Confirm New Password"
            inputPlaceHolder="Confirm your new password"
            inputType="password"
            [control]="changePasswordForm.get('rePassword')!"
          ></app-input-field>
        </div>
        <div class="pt-4">
          <button
            [disabled]="changePasswordForm.invalid || isLoading()"
            class="py-3 px-6 rounded-xl bg-[#E17100] text-white cursor-pointer font-semibold disabled:cursor-no-drop disabled:opacity-40"
          >
            @if (!isLoading()) {
              <i class="fa-solid fa-lock me-2"></i>
              Change Password
            }
            @if (isLoading()) {
              <i class="fa-solid fa-spinner animate-spin me-2"></i>
              Changing...
            }
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
