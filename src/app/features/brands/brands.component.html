<section>
  <div>
    <app-gradient-header
      bgFrom="from-[#7F22FE]"
      bgVia="via-[#8E51FF]"
      bgTo="to-[#C27AFF]"
      currentPage="Brands"
      title="Top Brands"
      [linksArr]="['home']"
      desc="Shop from your favorite brands"
      icon="fa-solid fa-tags"
    ></app-gradient-header>
  </div>
  @if (isLoading()) {
    <div class="flex justify-center items-center py-20">
      <div class="text-center">
        <i class="fa-solid fa-spinner animate-spin text-4xl text-green-600 mb-4"></i>
        <p class="text-gray-500">Loading brands...</p>
      </div>
    </div>
  }
  <div class="container mx-auto px-4 py-8">
    <section
      class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-6"
    >
      @for (brand of allBrands(); track brand._id) {
        <a
          [routerLink]="['/products']"
          [queryParams]="{ brand: brand._id }"
          class="bg-white border border-[#F3F4F6] p-5.25 rounded-2xl shadow-sm group hover:-translate-y-1 transition-all duration-300 hover:shadow-xl hover:border-violet-200"
        >
          <div class="p-4 rounded-xl bg-[#F9FAFB] aspect-square">
            <img
              [src]="brand.image"
              class="w-full h-full object-contain group-hover:scale-110 transition-all duration-500"
              [alt]="brand.name"
            />
          </div>
          <div
            class="mt-3 px-5.25 text-sm font-semibold text-center group-hover:text-violet-600 transition"
          >
            {{ brand.name }}
          </div>
          <div
            class="mt-1.5 flex justify-center items-center text-xs font-medium text-violet-600 opacity-0 group-hover:opacity-100 transition"
          >
            View Products
            <i class="fa-solid fa-arrow-right"></i>
          </div>
        </a>
      }
    </section>
  </div>
</section>
